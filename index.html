<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나랑 데이트할래? ❤️</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="container" id="main-card">
        <div class="image-wrapper">
            <img src="romantic_cute_illustration_1782002747705.png" alt="귀여운 토끼" id="cute-img">
        </div>
        <h1 class="question">
            <span id="user-name"></span>
            🌸 나랑 데이트 갈래? 🌸
        </h1>
        <div class="button-group">
            <button id="yes-btn" class="btn yes">응! ❤️</button>
            <button id="no-btn" class="btn no">아니.. 🍃</button>
        </div>
    </div>

    <div class="container success-screen hidden" id="success-card">
        <div class="image-wrapper">
            <img src="romantic_cute_illustration_1782002747705.png" alt="행복한 토끼" class="happy-img">
        </div>
        <h1 class="success-msg">야호! 이따 봐요! 💖✨</h1>
        <div class="hearts-container" id="hearts"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
